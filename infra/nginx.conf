server {
    listen 80;
    server_name _;   # Aceita qualquer hostname / IP

    # ── Frontend (React) ────────────────────────────────────────────────
    root /var/www/8patas/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API (FastAPI via Uvicorn) ────────────────────────────────
    # O frontend chama /api/... e o Nginx remove o prefixo /api ao repassar
    location /api/ {
        proxy_pass         http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # ── Logs ─────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/8patas_access.log;
    error_log   /var/log/nginx/8patas_error.log;

    # ── Segurança básica ─────────────────────────────────────────────────
    add_header X-Content-Type-Options  nosniff;
    add_header X-Frame-Options         SAMEORIGIN;
    add_header X-XSS-Protection        "1; mode=block";

    # Esconde versão do Nginx
    server_tokens off;

    # Tamanho máximo de upload (fotos de pets)
    client_max_body_size 15M;
}
